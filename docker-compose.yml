services:
  postgres:
    image: postgres:16-alpine
    container_name: pawforward-db
    environment:
      POSTGRES_DB: pawforward
      POSTGRES_USER: pawforward
      POSTGRES_PASSWORD: pawforward_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawforward"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pawforward-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pawforward.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
